<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HACK小舖 | HACK SHOP STORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #050505; color: #d1d5db; font-family: monospace; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #0891b2; }
        .scanline {
            background-color: #050505;
            background-image: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(8, 145, 178, 0.05) 50%, rgba(8, 145, 178, 0.05));
            background-size: 100% 4px;
        }
    </style>
</head>
<body class="selection:bg-cyan-900 selection:text-cyan-300 scanline">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const generateSessionId = () => Math.random().toString(36).substring(2, 15) + Math.random().toString(36).substring(2, 15);

        function App() {
            // 💡 新增：頁面視圖狀態 (home: 首頁商城, success: 結帳成功頁面)
            const [currentView, setCurrentView] = useState('home');

            const [products, setProducts] = useState([]);
            const [announcement, setAnnouncement] = useState(''); 
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [isLoginOpen, setIsLoginOpen] = useState(false);
            
            const [userEmail, setUserEmail] = useState(localStorage.getItem('axg_user_email') || ''); 
            const [verifyCode, setVerifyCode] = useState(''); 
            const [countdown, setCountdown] = useState(0);
            const [authMode, setAuthMode] = useState('login'); // 'login' | 'register'
            const [userPassword, setUserPassword] = useState('');
            const [regPassword, setRegPassword] = useState('');    
            
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [isSyncing, setIsSyncing] = useState(false); 
            
            // 💡 結帳成功後的資料保存
            const [orderSuccessData, setOrderSuccessData] = useState(null); 
            
            const [alertConfig, setAlertConfig] = useState({ isOpen: false, message: '', title: 'SYSTEM_NOTICE' });
            const [cartToast, setCartToast] = useState({ visible: false, productName: '' });
            const cartToastTimer = useRef(null);

            const [prevView, setPrevView] = useState('home');
            const [chatSessionId] = useState(() => localStorage.getItem('axg_chat_session') || generateSessionId());
            const [chatMessages, setChatMessages] = useState([]);
            const [chatInput, setChatInput] = useState('');
            const chatEndRef = useRef(null);

            const [detailModalOpen, setDetailModalOpen] = useState(false);
            const [selectedProduct, setSelectedProduct] = useState(null);

            const [isCheckoutConfirmOpen, setIsCheckoutConfirmOpen] = useState(false);
            const [isDisclaimerOpen, setIsDisclaimerOpen] = useState(false);
            const [agreedToTerms, setAgreedToTerms] = useState(false);

            const [memberTab, setMemberTab] = useState('dashboard');
            const [memberOrders, setMemberOrders] = useState([]);
            const [memberLoading, setMemberLoading] = useState(false);

            const showAlert = (message, title = 'SYSTEM_NOTICE') => {
                setAlertConfig({ isOpen: true, message, title });
            };

            // 💡 複製文字到剪貼簿功能
            const copyToClipboard = (text) => {
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(text).then(() => showAlert('帳號已複製到剪貼簿！', 'SUCCESS'));
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.position = "absolute";
                    textArea.style.left = "-999999px";
                    document.body.prepend(textArea);
                    textArea.select();
                    try {
                        document.execCommand('copy');
                        showAlert('帳號已複製到剪貼簿！', 'SUCCESS');
                    } catch (err) {
                        showAlert('複製失敗，請手動反白複製', 'ERROR');
                    } finally {
                        textArea.remove();
                    }
                }
            };

            useEffect(() => { localStorage.setItem('axg_chat_session', chatSessionId); }, [chatSessionId]);

            useEffect(() => {
                if (chatEndRef.current) chatEndRef.current.scrollIntoView({ behavior: "smooth" });
            }, [chatMessages, currentView]);

            const fetchAnnouncement = async () => {
                try {
                    const res = await fetch('/api/announcement');
                    if (res.ok) setAnnouncement((await res.json()).text || '');
                } catch (err) {}
            };

            const fetchProducts = async (isBackgroundSync = false) => {
                if (isBackgroundSync) setIsSyncing(true);
                try {
                    const res = await fetch('/api/products');
                    if (!res.ok) throw new Error(`連線失敗 (HTTP ${res.status})`);
                    const data = await res.json();
                    setProducts(data);
                    setCart(prevCart => prevCart.filter(item => data.find(p => p.id === item.id && p.stock >= item.quantity)));
                } catch (err) {
                    if (!isBackgroundSync) setError(err.message);
                } finally {
                    setLoading(false);
                    setTimeout(() => setIsSyncing(false), 1000); 
                }
            };

            const fetchChatMessages = async () => {
                if (currentView !== 'support') return;
                try {
                    const res = await fetch(`/api/chat/messages/${chatSessionId}`);
                    if (res.ok) setChatMessages(await res.json());
                } catch (err) {}
            };

            useEffect(() => {
                fetchAnnouncement();
                fetchProducts(false); 
                const interval = setInterval(() => {
                    fetchProducts(true);
                    fetchAnnouncement(); 
                }, 10000);
                return () => clearInterval(interval);
            }, []);

            useEffect(() => {
                let chatInterval;
                if (currentView === 'support') {
                    fetchChatMessages();
                    chatInterval = setInterval(fetchChatMessages, 3000);
                }
                return () => clearInterval(chatInterval);
            }, [currentView]);

            const handleSendMessage = async (e) => {
                e.preventDefault();
                if (!chatInput.trim()) return;
                const msg = chatInput.trim();
                setChatInput('');
                setChatMessages(prev => [...prev, { sender: 'user', message: msg, created_at: new Date().toISOString() }]);
                try {
                    await fetch('/api/chat/send', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ session_id: chatSessionId, user_email: userEmail, sender: 'user', message: msg })
                    });
                    fetchChatMessages();
                } catch (err) { showAlert('訊息發送失敗', 'ERROR'); }
            };

            useEffect(() => {
                let timer;
                if (countdown > 0) timer = setInterval(() => setCountdown(prev => prev - 1), 1000);
                return () => clearInterval(timer);
            }, [countdown]);

            const handleSendCode = async () => {
                if (!userEmail || !userEmail.includes('@')) return showAlert('請輸入有效的電子信箱', 'WARNING');
                try {
                    const response = await fetch('/api/auth/send-code', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: userEmail })
                    });
                    if (response.ok) {
                        setCountdown(60); 
                        showAlert('驗證碼已發送至您的信箱，請查收！', 'SUCCESS');
                    } else {
                        const data = await response.json();
                        showAlert(data.error || '寄件失敗', 'ERROR');
                    }
                } catch (err) { showAlert('無法連線到伺服器發送郵件。', 'ERROR'); }
            };

            const handleBindEmail = async () => {
                if (!userEmail || !verifyCode || !regPassword) return showAlert('請填寫所有欄位', 'WARNING');
                if (regPassword.length < 6) return showAlert('密碼至少需要 6 個字元', 'WARNING');
                try {
                    const response = await fetch('/api/auth/member/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: userEmail, password: regPassword, code: verifyCode })
                    });
                    if (response.ok) {
                        localStorage.setItem('axg_user_email', userEmail);
                        setIsLoginOpen(false);
                        setVerifyCode('');
                        setRegPassword('');
                        showAlert('帳號註冊成功！', 'SUCCESS');
                    } else {
                        const data = await response.json();
                        showAlert(data.error || '註冊失敗', 'ERROR');
                    }
                } catch (err) { showAlert('註冊失敗', 'ERROR'); }
            };

            const handleMemberLogin = async () => {
                if (!userEmail || !userPassword) return showAlert('請輸入信箱與密碼', 'WARNING');
                try {
                    const response = await fetch('/api/auth/member/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: userEmail, password: userPassword })
                    });
                    if (response.ok) {
                        const data = await response.json();
                        localStorage.setItem('axg_user_email', data.email);
                        setUserEmail(data.email);
                        setUserPassword('');
                        setIsLoginOpen(false);
                        showAlert('登入成功！', 'SUCCESS');
                    } else {
                        const data = await response.json();
                        showAlert(data.error || '登入失敗', 'ERROR');
                    }
                } catch (err) { showAlert('登入失敗', 'ERROR'); }
            };

            const fetchMemberOrders = async () => {
                if (!userEmail) return;
                setMemberLoading(true);
                try {
                    const res = await fetch(`/api/member/orders?email=${encodeURIComponent(userEmail)}`);
                    const data = await res.json();
                    setMemberOrders(Array.isArray(data) ? data : []);
                } catch (e) { setMemberOrders([]); }
                finally { setMemberLoading(false); }
            };

            const handleUserButtonClick = () => {
                if (userEmail) {
                    setMemberTab('dashboard');
                    setCurrentView('member');
                    fetchMemberOrders();
                    window.scrollTo(0, 0);
                } else {
                    setAuthMode('login');
                    setUserPassword('');
                    setIsLoginOpen(true);
                }
            };

            const addToCart = (product) => {
                setCart(prev => {
                    const existing = prev.find(item => item.id === product.id);
                    if (existing && existing.quantity >= product.stock) {
                        showAlert(`【警告】庫存不足！${product.name} 目前庫存僅剩 ${product.stock} 件。`, 'WARNING');
                        return prev;
                    }
                    if (cartToastTimer.current) clearTimeout(cartToastTimer.current);
                    setCartToast({ visible: true, productName: product.name });
                    cartToastTimer.current = setTimeout(() => setCartToast({ visible: false, productName: '' }), 3000);
                    if (existing) return prev.map(item => item.id === product.id ? { ...item, quantity: item.quantity + 1 } : item);
                    return [...prev, { ...product, quantity: 1 }];
                });
            };

            const removeFromCart = (id) => setCart(prev => prev.filter(item => item.id !== id));
            const cartTotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            const handleCheckoutClick = () => {
                if (!userEmail) {
                    setIsLoginOpen(true);
                    showAlert('系統提示：請先註冊帳號才能結帳！', 'SYSTEM_NOTICE');
                    setAuthMode('register');
                    return;
                }
                setAgreedToTerms(false); 
                setIsCheckoutConfirmOpen(true);
            };

            const submitOrder = async () => {
                if (!agreedToTerms) return;
                setIsCheckoutConfirmOpen(false); 
                
                const checkoutData = { email: userEmail, cartItems: cart.map(item => ({ id: item.id, quantity: item.quantity })) };
                try {
                    const response = await fetch('/api/orders/checkout', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(checkoutData)
                    });
                    const result = await response.json();
                    if (response.ok) {
                        // 💡 儲存完整的訂單資訊，供付款頁面顯示
                        setOrderSuccessData({ 
                            orderId: result.orderId, 
                            totalPrice: result.totalPrice,
                            virtualAccount: result.virtualAccount,
                            items: [...cart], // 複製購物車內容
                            createdAt: new Date()
                        });
                        setCart([]);
                        setIsCartOpen(false);
                        fetchProducts(true); 

                        // 💡 觸發頁面跳轉
                        setCurrentView('success');
                        window.scrollTo(0, 0); // 跳轉時滾動到最頂部
                    } else showAlert(`❌ 結帳失敗: ${result.error}`, 'ERROR');
                } catch (err) { showAlert('❌ 系統錯誤，無法連線至結帳伺服器。', 'ERROR'); }
            };

            const openDetailModal = (product) => {
                setSelectedProduct(product);
                setDetailModalOpen(true);
            };

            return (
                <div className="min-h-screen flex flex-col relative">
                    <video autoPlay loop muted playsInline className="fixed inset-0 w-full h-full object-cover z-0 opacity-30 pointer-events-none">
                        <source src="003c4e16-d0b0-420b-a58d-aa0880e10f5b.mp4" type="video/mp4" />
                    </video>

                    {/* ============================================================== */}
                    {/* 視圖一：商城首頁 (HOME VIEW) */}
                    {/* ============================================================== */}
                    {currentView === 'home' && (
                        <div className="relative z-10 flex flex-col min-h-screen">
                            <header className="border-b border-cyan-900/50 bg-black/80 backdrop-blur-md sticky top-0 z-40">
                                <div className="container mx-auto px-4 h-16 flex items-center justify-between">
                                    <div className="flex items-center space-x-3">
                                        <div className="bg-cyan-600 text-black font-bold px-2 py-1 transform -skew-x-12 tracking-wider">HACK</div>
                                        <h1 className="text-xl font-bold text-white tracking-widest flex items-center">
                                            HACK小舖 
                                            <span className="text-cyan-500 text-xs ml-3 font-mono tracking-wider opacity-90 border-l border-cyan-800 pl-3 hidden sm:inline-block">
                                                營業時間 AM9:00-PM12:00
                                            </span>
                                        </h1>
                                    </div>
                                    <div className="flex items-center space-x-6 text-sm">
                                        <button onClick={() => { setPrevView('home'); setCurrentView('support'); setChatMessages([]); window.scrollTo(0,0); }} className="hidden sm:flex items-center text-gray-400 hover:text-cyan-400 transition-colors">
                                            <i className="fas fa-headset mr-2"></i> 客服
                                        </button>
                                        <button onClick={handleUserButtonClick} className="flex items-center text-gray-400 hover:text-cyan-400 transition-colors">
                                            <i className="fas fa-user mr-2"></i> {userEmail ? userEmail.split('@')[0] : '註冊帳號'}
                                        </button>
                                        <button onClick={() => setIsCartOpen(true)} className="flex items-center text-gray-400 hover:text-cyan-400 transition-colors relative">
                                            <i className="fas fa-shopping-cart text-lg"></i>
                                            {cart.length > 0 && <span className="absolute -top-2 -right-3 bg-cyan-600 text-black font-bold text-xs rounded-full w-5 h-5 flex items-center justify-center">{cart.length}</span>}
                                        </button>
                                    </div>
                                </div>
                                {announcement && (
                                    <div className="bg-cyan-950/40 border-b border-cyan-900/50 text-cyan-400 py-1.5 flex items-center shadow-[0_0_15px_rgba(8,145,178,0.2)]">
                                        <div className="px-4 font-bold tracking-widest text-xs border-r border-cyan-800 whitespace-nowrap bg-black z-10 flex items-center h-full">
                                            <i className="fas fa-broadcast-tower mr-2 animate-pulse text-red-500"></i> SYSTEM_BROADCAST
                                        </div>
                                        <marquee className="text-xs tracking-widest font-bold ml-3 flex-grow" scrollamount="6">{announcement}</marquee>
                                    </div>
                                )}
                            </header>

                            <main className="flex-grow container mx-auto px-4 py-12 flex flex-col items-center justify-center min-h-[35vh]">
                                    <h2 className="text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600 tracking-[0.2em] uppercase text-center filter drop-shadow-[0_0_15px_rgba(34,211,238,0.4)]">
                                    HACK SHOP STORE
                                </h2>
                            </main>

                            <section className="container mx-auto px-4 pb-20">
                                <div className="flex items-center mb-8 border-l-4 border-cyan-500 pl-4 bg-black/40 py-2 pr-4 backdrop-blur-sm inline-flex">
                                    <h3 className="text-2xl font-bold text-white tracking-widest uppercase">Digital Assets</h3>
                                    <span className="ml-4 text-xs text-gray-500">LIVE INVENTORY</span>
                                    {isSyncing && <span className="ml-4 text-xs text-cyan-400 font-bold animate-pulse"><i className="fas fa-satellite-dish mr-1"></i>SYNCING...</span>}
                                </div>

                                {loading && (<div className="text-center py-10 text-cyan-500 animate-pulse tracking-widest bg-black/50 backdrop-blur-sm"><i className="fas fa-circle-notch fa-spin text-2xl mb-4 block"></i>CONNECTING TO GCP DATABASE...</div>)}
                                {error && (<div className="border border-red-900/50 bg-red-950/40 p-6 text-center backdrop-blur-sm"><p className="text-red-500 mb-2 font-bold"><i className="fas fa-exclamation-triangle mr-2"></i>[SYSTEM ERROR]</p><p className="text-red-400 text-sm">{error}</p></div>)}

                                {!loading && !error && (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                                        {products.map(product => (
                                            <div key={product.id} className="bg-[#151515]/90 backdrop-blur-sm border border-gray-800 hover:border-cyan-500/50 transition-all duration-300 group overflow-hidden relative flex flex-col shadow-lg">
                                                <div className="absolute top-3 right-3 flex space-x-1 bg-black/80 border border-gray-800 p-1 rounded-sm backdrop-blur-md z-10 shadow-lg">
                                                    <i className={`fas fa-check text-[10px] px-1.5 py-0.5 rounded-sm ${product.helper_status === 'normal' || !product.helper_status ? 'bg-green-900/60 text-green-400 shadow-[0_0_8px_rgba(34,197,94,0.4)]' : 'text-gray-700'}`}></i>
                                                    <i className={`fas fa-tools text-[10px] px-1.5 py-0.5 rounded-sm ${product.helper_status === 'maintenance' ? 'bg-yellow-900/60 text-yellow-400 shadow-[0_0_8px_rgba(234,179,8,0.4)]' : 'text-gray-700'}`}></i>
                                                    <i className={`fas fa-skull text-[10px] px-1.5 py-0.5 rounded-sm ${product.helper_status === 'danger' ? 'bg-red-900/60 text-red-400 shadow-[0_0_8px_rgba(239,68,68,0.4)]' : 'text-gray-700'}`}></i>
                                                </div>
                                                <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-cyan-900 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                                                <div className="p-6 flex-grow pt-8 flex flex-col">
                                                    <div className="text-xs text-cyan-600 font-bold mb-2 tracking-wider">[{product.category}]</div>
                                                    <h4 className="text-lg text-white font-medium mb-3">{product.name}</h4>
                                                    
                                                    <div className="mb-6">
                                                        <button onClick={() => openDetailModal(product)} className="text-xs text-cyan-500 hover:text-cyan-300 underline tracking-wider flex items-center transition-colors w-fit">
                                                            <i className="fas fa-file-alt mr-1"></i> 查看商品詳情
                                                        </button>
                                                    </div>

                                                    <div className="flex items-end justify-between mt-auto">
                                                        <span className="text-2xl text-cyan-400 font-bold">NT$ {parseFloat(product.price)}</span>
                                                        <span className={`text-xs font-bold ${product.stock < 10 ? 'text-red-500 animate-pulse' : 'text-gray-500'}`}>Stock: {product.stock}</span>
                                                    </div>
                                                </div>
                                                {product.helper_status === 'maintenance' || product.helper_status === 'danger' ? (
                                                    <button disabled className="w-full bg-gray-900 border-t border-gray-800 text-gray-500 py-3 font-bold tracking-widest flex items-center justify-center text-sm cursor-not-allowed"><i className="fas fa-ban mr-2"></i> TEMPORARILY DISABLED</button>
                                                ) : (
                                                    <button onClick={() => addToCart(product)} className="w-full bg-cyan-950/80 hover:bg-cyan-600 text-cyan-300 hover:text-black py-3 font-bold tracking-widest transition-colors flex items-center justify-center text-sm"><i className="fas fa-shopping-cart mr-2"></i> 購買</button>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </section>

                            {/* 其他模態視窗 */}
                            {detailModalOpen && selectedProduct && (
                                <div className="fixed inset-0 z-[80] flex items-center justify-center p-4">
                                    <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" onClick={() => setDetailModalOpen(false)}></div>
                                    <div className="w-full max-w-lg bg-[#0a0a0a] border border-cyan-500/50 p-8 relative z-10 shadow-[0_0_40px_rgba(8,145,178,0.3)]">
                                        <button onClick={() => setDetailModalOpen(false)} className="absolute top-4 right-4 text-gray-500 hover:text-white transition-colors">
                                            <i className="fas fa-times text-xl"></i>
                                        </button>
                                        <div className="mb-6">
                                            <div className="inline-block bg-cyan-600 text-black font-bold px-3 py-1 mb-3 transform -skew-x-12 tracking-widest text-xs">ITEM_DETAILS</div>
                                            <h2 className="text-2xl text-white font-bold tracking-wider mb-1">{selectedProduct.name}</h2>
                                            <div className="text-xs text-cyan-600 font-bold tracking-wider">[{selectedProduct.category}]</div>
                                        </div>
                                        <div className="bg-[#111] border border-gray-800 p-5 min-h-[150px] max-h-[300px] overflow-y-auto">
                                            {selectedProduct.description ? (
                                                <p className="text-gray-300 text-sm leading-relaxed whitespace-pre-wrap font-mono">{selectedProduct.description}</p>
                                            ) : (
                                                <p className="text-gray-600 text-sm italic text-center mt-10"><i className="fas fa-box-open block text-2xl mb-2"></i>無詳細說明 (NO_DETAILS_PROVIDED)</p>
                                            )}
                                        </div>
                                        <div className="mt-6 flex justify-end">
                                            <button onClick={() => setDetailModalOpen(false)} className="bg-gray-800 hover:bg-gray-700 border border-gray-700 text-white px-6 py-2 tracking-widest transition-colors text-sm font-bold">關閉 (CLOSE)</button>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {isCartOpen && (
                                <div className="fixed inset-0 z-50 flex justify-end">
                                    <div className="absolute inset-0 bg-black/70 backdrop-blur-sm" onClick={() => setIsCartOpen(false)}></div>
                                    <div className="w-full max-w-md bg-[#0a0a0a] border-l border-cyan-900/50 shadow-2xl relative z-10 flex flex-col h-full">
                                        <div className="p-6 border-b border-gray-800 flex justify-between items-center bg-black">
                                            <h3 className="text-xl font-bold text-cyan-400 tracking-widest"><i className="fas fa-desktop mr-2"></i> CART_TERMINAL</h3>
                                            <button onClick={() => setIsCartOpen(false)} className="text-gray-500 hover:text-white"><i className="fas fa-times text-xl"></i></button>
                                        </div>
                                        <div className="flex-grow overflow-y-auto p-6 space-y-4">
                                            {cart.length === 0 ? <div className="text-center text-gray-600 mt-10 text-sm">NO_ASSETS_SELECTED</div> : cart.map(item => (
                                                <div key={item.id} className="flex justify-between items-center bg-[#111] p-4 border border-gray-800">
                                                    <div>
                                                        <div className="text-xs text-cyan-700 mb-1">[{item.category}]</div>
                                                        <div className="text-white text-sm">{item.name}</div>

                                                    <div className="w-3/4 text-gray-400 font-bold text-sm">應付金額 Total Amount</div>
                                                    <div className="w-1/4 text-red-500 font-black text-xl">NT$ {orderSuccessData.totalPrice}</div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* 表格 3：匯款帳號 */}
                                        <div className="border border-cyan-900/50 bg-cyan-950/10">
                                            <div className="flex border-b border-gray-800">
                                                <div className="w-1/3 sm:w-1/4 bg-[#111] p-5 text-gray-400 text-sm font-bold tracking-wider flex items-center">ATM 繳費帳號</div>
                                                <div className="w-2/3 sm:w-3/4 p-5">
                                                    <div className="text-gray-300 text-sm mb-3 font-bold">銀行代碼：<span className="text-cyan-400 text-lg">700</span> (中華郵政)</div>
                                                    <div className="flex flex-col sm:flex-row sm:items-center space-y-3 sm:space-y-0 sm:space-x-4 mb-4">
                                                        <div className="text-gray-400 text-sm shrink-0">帳號：</div>
                                                        <span className="text-base sm:text-3xl text-cyan-400 font-mono font-black tracking-normal sm:tracking-widest select-all bg-black/50 px-3 py-1 border border-cyan-900/30 break-all">
                                                            00812680112040
                                                        </span>
                                                        <button onClick={() => copyToClipboard('00812680112040')} className="bg-gray-800 hover:bg-gray-700 text-white px-4 py-2 text-xs transition-colors border border-gray-700 w-fit shrink-0">
                                                            <i className="fas fa-copy mr-2"></i>複製帳號
                                                        </button>
                                                    </div>
                                                    <p className="text-red-500/90 text-xs leading-relaxed font-bold">
                                                        提醒您，若遇疑似詐騙，請立即撥打 165 反詐騙專線。付款前請確認商品內容，以避免遭受詐騙。
                                                    </p>
                                                </div>
                                            </div>
                                            <div className="flex">
                                                <div className="w-1/3 sm:w-1/4 bg-[#111] p-4 text-gray-400 text-sm font-bold tracking-wider flex items-center">繳費截止時間</div>
                                                <div className="w-2/3 sm:w-3/4 p-4 text-red-400 font-mono font-bold tracking-wider text-lg">
                                                    {new Date(orderSuccessData.createdAt.getTime() + 24 * 60 * 60 * 1000).toLocaleString('zh-TW', { hour12: false })}
                                                </div>
                                            </div>
                                        </div>

                                        {/* 注意事項 */}
                                        <div className="text-xs sm:text-sm text-gray-500 space-y-2 pt-4">
                                            <p className="font-bold text-gray-400 mb-3">注意事項：</p>
                                            <p>• 轉帳成功後，系統將於成功後的 1 至 2 個小時內，自動核對帳款並發送商品至您的信箱。</p>
                                            <p>• 若逾期未繳費，此專屬虛擬帳號將自動失效，請勿進行匯款。</p>
                                            <p>• 跨行轉帳將依各家銀行規定收取手續費 (通常為 15 元)。</p>
                                        </div>
                                    </div>

                                    <div className="mt-12 flex justify-center">
                                        <button onClick={() => { setCurrentView('home'); setOrderSuccessData(null); window.scrollTo(0,0); }} className="bg-cyan-900/60 hover:bg-cyan-700 border border-cyan-500 text-cyan-300 hover:text-white px-10 py-4 font-bold tracking-widest transition-colors shadow-[0_0_15px_rgba(8,145,178,0.4)]">
                                            <i className="fas fa-home mr-2"></i> 返回商城首頁 (RETURN_TO_STORE)
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ============================================================== */}
                    {/* 💡 視圖三：會員專區 (MEMBER AREA) */}
                    {/* ============================================================== */}
                    {currentView === 'member' && userEmail && (
                        <div className="relative z-10 flex flex-col min-h-screen">
                            <header className="border-b border-cyan-900/50 bg-black/90 backdrop-blur-md sticky top-0 z-40">
                                <div className="container mx-auto px-4 h-16 flex items-center justify-between">
                                    <div className="flex items-center space-x-3">
                                        <div className="bg-cyan-600 text-black font-bold px-2 py-1 transform -skew-x-12 tracking-wider">HACK</div>
                                        <h1 className="text-xl font-bold text-white tracking-widest">HACK小舖 <span className="text-cyan-500 text-sm ml-2">MEMBER</span></h1>
                                    </div>
                                    <div className="flex items-center space-x-5 text-sm">
                                        <button onClick={() => { setCurrentView('home'); window.scrollTo(0,0); }} className="text-gray-400 hover:text-cyan-400 transition-colors text-xs tracking-widest hidden sm:block">
                                            <i className="fas fa-store mr-1"></i> 返回商城
                                        </button>
                                        <button onClick={() => { setCurrentView('home'); setIsCartOpen(true); window.scrollTo(0,0); }} className="flex items-center text-gray-400 hover:text-cyan-400 transition-colors relative">
                                            <i className="fas fa-shopping-cart text-lg"></i>
                                            {cart.length > 0 && <span className="absolute -top-2 -right-3 bg-cyan-600 text-black font-bold text-xs rounded-full w-5 h-5 flex items-center justify-center">{cart.length}</span>}
                                        </button>
                                    </div>
                                </div>
                            </header>

                            <div className="container mx-auto px-4 py-6 pb-16">
                                <div className="text-xs text-gray-500 mb-4 flex items-center space-x-2">
                                    <button onClick={() => { setCurrentView('home'); window.scrollTo(0,0); }} className="hover:text-cyan-400 transition-colors">首頁</button>
                                    <span>/</span>
                                    <span className="text-cyan-400">
                                        {memberTab === 'dashboard' ? '控制台' : memberTab === 'orders' ? '訂單' : '帳號資料'}
                                    </span>
                                </div>

                                <h1 className="text-3xl font-black text-white mb-8 tracking-widest">會員專區</h1>

                                <div className="flex flex-col lg:flex-row gap-6 items-start">
                                    {/* --- 側邊欄 --- */}
                                    <aside className="w-full lg:w-60 shrink-0 bg-[#0f0f0f] border border-gray-800">
                                        <div className="p-5 border-b border-gray-800 flex items-center space-x-3">
                                            <div className="w-10 h-10 bg-cyan-900/50 border border-cyan-700/50 flex items-center justify-center text-cyan-400 font-black text-lg shrink-0">
                                                {userEmail[0].toUpperCase()}
                                            </div>
                                            <div className="overflow-hidden">
                                                <p className="text-white font-bold text-sm truncate">{userEmail.split('@')[0]}</p>
                                                <p className="text-gray-500 text-xs truncate">{userEmail}</p>
                                            </div>
                                        </div>
                                        <nav className="p-2">
                                            {[
                                                { id: 'dashboard', icon: 'fa-th-large', label: '控制台' },
                                                { id: 'orders',    icon: 'fa-receipt',  label: '訂單' },
                                                { id: 'account',   icon: 'fa-user-cog', label: 'Account details' },
                                            ].map(item => (
                                                <button key={item.id}
                                                    onClick={() => { setMemberTab(item.id); if (item.id === 'orders') fetchMemberOrders(); }}
                                                    className={`w-full text-left px-4 py-3 flex items-center space-x-3 text-sm font-bold tracking-wider transition-colors border-l-2 ${memberTab === item.id ? 'bg-cyan-900/20 text-cyan-400 border-cyan-500' : 'text-gray-400 hover:text-white hover:bg-gray-800/40 border-transparent'}`}>
                                                    <i className={`fas ${item.icon} w-4 text-xs`}></i>
                                                    <span>{item.label}</span>
                                                </button>
                                            ))}
                                            <button onClick={() => { setPrevView('member'); setCurrentView('support'); setChatMessages([]); window.scrollTo(0,0); }}
                                                className="w-full text-left px-4 py-3 flex items-center space-x-3 text-sm font-bold tracking-wider text-gray-400 hover:text-white hover:bg-gray-800/40 transition-colors border-l-2 border-transparent">
                                                <i className="fas fa-headset w-4 text-xs"></i>
                                                <span>聯絡客服</span>
                                            </button>
                                            <div className="border-t border-gray-800 mt-2 pt-2">
                                                <button onClick={() => { localStorage.removeItem('axg_user_email'); setUserEmail(''); setUserPassword(''); setMemberOrders([]); setCurrentView('home'); window.scrollTo(0,0); }}
                                                    className="w-full text-left px-4 py-3 flex items-center space-x-3 text-sm font-bold tracking-wider text-red-500/80 hover:text-red-400 hover:bg-red-900/10 transition-colors border-l-2 border-transparent">
                                                    <i className="fas fa-sign-out-alt w-4 text-xs"></i>
                                                    <span>Logout</span>
                                                </button>
                                            </div>
                                        </nav>
                                    </aside>

                                    {/* --- 主內容 --- */}
                                    <div className="flex-1 min-w-0 space-y-4">

                                        {/* 控制台 */}
                                        {memberTab === 'dashboard' && (
                                            <div className="space-y-4">
                                                <div className="bg-[#0f0f0f] border border-gray-800 p-6">
                                                    <h2 className="text-lg font-bold text-white tracking-widest mb-1">歡迎回來，{userEmail.split('@')[0]}</h2>
                                                    <p className="text-gray-500 text-sm">從您的帳戶儀表板，您可以查看最近的訂單與帳號資料。</p>
                                                </div>
                                                <div className="grid grid-cols-3 gap-4">
                                                    <div className="bg-[#0f0f0f] border border-gray-800 p-5">
                                                        <p className="text-gray-500 text-xs tracking-widest mb-2">總訂單</p>
                                                        <p className="text-2xl font-black text-white">{memberLoading ? '...' : memberOrders.length}</p>
                                                    </div>
                                                    <div className="bg-[#0f0f0f] border border-gray-800 p-5">
                                                        <p className="text-gray-500 text-xs tracking-widest mb-2">待付款</p>
                                                        <p className="text-2xl font-black text-yellow-400">{memberLoading ? '...' : memberOrders.filter(o => o.status === 'pending').length}</p>
                                                    </div>
                                                    <div className="bg-[#0f0f0f] border border-gray-800 p-5">
                                                        <p className="text-gray-500 text-xs tracking-widest mb-2">已完成</p>
                                                        <p className="text-2xl font-black text-green-400">{memberLoading ? '...' : memberOrders.filter(o => o.status === 'completed').length}</p>
                                                    </div>
                                                </div>
                                                <div className="bg-[#0f0f0f] border border-gray-800 p-5">
                                                    <button onClick={() => { setMemberTab('orders'); fetchMemberOrders(); }} className="text-cyan-400 hover:text-cyan-300 text-sm font-bold tracking-widest transition-colors">
                                                        <i className="fas fa-arrow-right mr-2"></i>查看所有訂單
                                                    </button>
                                                </div>
                                            </div>
                                        )}

                                        {/* 訂單 */}
                                        {memberTab === 'orders' && (
                                            <div className="bg-[#0f0f0f] border border-gray-800">
                                                <div className="p-5 border-b border-gray-800">
                                                    <h2 className="text-base font-bold text-white tracking-widest">訂單紀錄</h2>
                                                </div>
                                                {memberLoading ? (
                                                    <div className="p-12 text-center text-cyan-500 animate-pulse text-sm">
                                                        <i className="fas fa-circle-notch fa-spin mr-2"></i>載入中...
                                                    </div>
                                                ) : memberOrders.length === 0 ? (
                                                    <div className="p-12 text-center text-gray-600 text-sm">
                                                        <i className="fas fa-box-open block text-3xl mb-3 text-gray-700"></i>
                                                        尚無訂單紀錄
                                                    </div>
                                                ) : (
                                                    <div className="overflow-x-auto">
                                                        <table className="w-full text-sm">
                                                            <thead>
                                                                <tr className="border-b border-gray-800 text-gray-400 text-xs tracking-widest bg-black/40">
                                                                    <th className="text-left p-4 font-bold">訂單</th>
                                                                    <th className="text-left p-4 font-bold hidden sm:table-cell">發佈日期</th>
                                                                    <th className="text-left p-4 font-bold">狀態</th>
                                                                    <th className="text-left p-4 font-bold">總計</th>
                                                                    <th className="text-left p-4 font-bold">動作</th>
                                                                </tr>
                                                            </thead>
                                                            <tbody>
                                                                {memberOrders.map(order => {
                                                                    const sMap = {
                                                                        pending:    { label: '待付款', cls: 'text-yellow-400' },
                                                                        processing: { label: '處理中', cls: 'text-blue-400'   },
                                                                        completed:  { label: '已完成', cls: 'text-green-400'  },
                                                                        cancelled:  { label: '已取消', cls: 'text-red-400'    },
                                                                        on_hold:    { label: '保留',   cls: 'text-orange-400' },
                                                                    };
                                                                    const s = sMap[order.status] || { label: order.status, cls: 'text-gray-400' };
                                                                    return (
                                                                        <tr key={order.id} className="border-b border-gray-800/50 hover:bg-gray-900/30 transition-colors">
                                                                            <td className="p-4 text-cyan-400 font-mono font-bold text-xs max-w-[120px] truncate">#{order.id}</td>
                                                                            <td className="p-4 text-gray-400 hidden sm:table-cell whitespace-nowrap">{new Date(order.created_at).toLocaleDateString('zh-TW')}</td>
                                                                            <td className={`p-4 font-bold whitespace-nowrap ${s.cls}`}>{s.label}</td>
                                                                            <td className="p-4 text-white font-bold whitespace-nowrap">
                                                                                NT${parseFloat(order.total_price).toLocaleString()}
                                                                                <span className="text-gray-500 font-normal text-xs ml-1 hidden sm:inline">(共 {order.item_count} 件)</span>
                                                                            </td>
                                                                            <td className="p-4">
                                                                                <button onClick={() => showAlert(`訂單編號：${order.id}\n狀態：${s.label}\n金額：NT$${parseFloat(order.total_price).toLocaleString()}\n建立時間：${new Date(order.created_at).toLocaleString('zh-TW', { hour12: false })}\n\n繳費帳號（郵政700）：\n00812680112040`, '訂單詳情')}
                                                                                    className="bg-cyan-700 hover:bg-cyan-600 text-white px-4 py-1.5 text-xs font-bold tracking-wider transition-colors whitespace-nowrap">
                                                                                    查看
                                                                                </button>
                                                                            </td>
                                                                        </tr>
                                                                    );
                                                                })}
                                                            </tbody>
                                                        </table>
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {/* 帳號資料 */}
                                        {memberTab === 'account' && (
                                            <div className="bg-[#0f0f0f] border border-gray-800">
                                                <div className="p-5 border-b border-gray-800">
                                                    <h2 className="text-base font-bold text-white tracking-widest">帳號資料</h2>
                                                </div>
                                                <div className="p-6 space-y-6">
                                                    <div>
                                                        <label className="block text-xs text-cyan-600 tracking-widest mb-2">電子信箱</label>
                                                        <div className="bg-[#111] border border-gray-700 text-gray-400 px-4 py-3 text-sm font-mono">{userEmail}</div>
                                                    </div>
                                                    <div className="border-t border-gray-800 pt-5">
                                                        <p className="text-gray-500 text-xs leading-relaxed">此為您的專屬接收信箱，商品發貨後將寄送至此信箱。如需更換信箱，請點擊下方按鈕重新驗證新信箱。</p>
                                                    </div>
                                                    <button onClick={() => setIsLoginOpen(true)} className="bg-cyan-900/40 hover:bg-cyan-800/60 border border-cyan-800 text-cyan-400 px-6 py-2.5 text-xs font-bold tracking-widest transition-colors">
                                                        <i className="fas fa-edit mr-2"></i>更換信箱
                                                    </button>
                                                </div>
                                            </div>
                                        )}

                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 自訂系統提示彈窗 (取代 alert) */}
                    {cartToast.visible && (
                        <div className="fixed top-20 right-4 z-[110] flex flex-col bg-[#0a0a0a] border border-cyan-500/60 shadow-[0_0_20px_rgba(8,145,178,0.3)] p-4 max-w-xs w-full sm:w-72 animate-fade-in">
                            <div className="flex items-start justify-between mb-2">
                                <span className="text-green-400 font-bold text-xs tracking-widest flex items-center"><i className="fas fa-check-circle mr-2"></i>已加入購物車</span>
                                <button onClick={() => { clearTimeout(cartToastTimer.current); setCartToast({ visible: false, productName: '' }); }} className="text-gray-500 hover:text-white transition-colors ml-2"><i className="fas fa-times text-xs"></i></button>
                            </div>
                            <p className="text-gray-300 text-sm mb-3 truncate">{cartToast.productName}</p>
                            <button onClick={() => { clearTimeout(cartToastTimer.current); setCartToast({ visible: false, productName: '' }); setIsCartOpen(true); }} className="bg-cyan-700 hover:bg-cyan-600 text-white text-xs font-bold py-2 px-4 tracking-widest transition-colors w-full">
                                <i className="fas fa-shopping-cart mr-2"></i>前往購物車
                            </button>
                        </div>
                    )}

                    {alertConfig.isOpen && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-black/80 backdrop-blur-sm" onClick={() => setAlertConfig({ ...alertConfig, isOpen: false })}></div>
                            <div className="w-full max-w-sm bg-[#0a0a0a] border border-cyan-500/50 p-6 relative z-10 shadow-[0_0_30px_rgba(34,211,238,0.2)] flex flex-col">
                                <div className="flex justify-between items-center mb-4 border-b border-gray-800 pb-3">
                                    <h3 className="text-cyan-400 font-bold tracking-widest text-sm flex items-center">
                                        <i className="fas fa-exclamation-circle mr-2 animate-pulse text-cyan-500"></i>
                                        {alertConfig.title}
                                    </h3>
                                    <button onClick={() => setAlertConfig({ ...alertConfig, isOpen: false })} className="text-gray-500 hover:text-white transition-colors"><i className="fas fa-times"></i></button>
                                </div>
                                <div className="py-4"><p className="text-gray-200 text-sm leading-relaxed tracking-wider">{alertConfig.message}</p></div>
                                <div className="mt-4 flex justify-end">
                                    <button onClick={() => setAlertConfig({ ...alertConfig, isOpen: false })} className="bg-cyan-900/60 hover:bg-cyan-700 text-cyan-300 hover:text-white px-6 py-2 font-bold tracking-widest transition-colors text-xs border border-cyan-800">確認 (OK)</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
